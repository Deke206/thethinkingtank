name: Apply index hero refinements

on:
  push:
    paths:
      - .github/workflows/apply-index-hero-refinements.yml

permissions:
  contents: write

jobs:
  apply-refinements:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update index hero banner
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')
          controls_start = html.find('      <div class="hero-carousel__controls"')
          container_marker = '\n    </div>\n\n    <div class="container py-4">'
          if controls_start == -1:
              raise SystemExit('Hero controls block was not found in index.html')
          controls_end = html.find(container_marker, controls_start)
          if controls_end == -1:
              raise SystemExit('Hero carousel closing marker was not found in index.html')
          html = html[:controls_start] + html[controls_end:]
          index_path.write_text(html, encoding='utf-8')

          css_path = Path('css/site.css')
          css = css_path.read_text(encoding='utf-8')

          old_overlay = '''  background:
            linear-gradient(90deg, rgba(3, 9, 24, .94) 0%, rgba(3, 9, 24, .76) 38%, rgba(3, 9, 24, .1) 74%),
            linear-gradient(0deg, rgba(3, 9, 24, .68), transparent 56%);'''
          old_overlay = old_overlay.replace('          ', '')
          new_overlay = '  background: linear-gradient(0deg, rgba(3, 9, 24, .68), transparent 56%);'
          if old_overlay not in css:
              raise SystemExit('Desktop hero overlay was not found in css/site.css')
          css = css.replace(old_overlay, new_overlay, 1)

          controls_css_start = css.find('.hero-carousel__controls {')
          controls_css_end = css.find('@keyframes hero-scene-drift', controls_css_start)
          if controls_css_start == -1 or controls_css_end == -1:
              raise SystemExit('Hero control CSS block was not found in css/site.css')
          css = css[:controls_css_start] + css[controls_css_end:]

          css = css.replace('var(--scene-duration, 35000ms)', 'var(--scene-duration, 8000ms)')
          css = css.replace('@keyframes hero-progress { to { transform: scaleX(1); } }\n\n', '')
          css = css.replace('padding-top: 1.6rem; padding-bottom: 7.5rem;', 'padding-top: 1.6rem; padding-bottom: 1.6rem;')
          css = css.replace('padding-top: 3.6rem !important; padding-bottom: 4rem;', 'padding-top: 3.6rem !important; padding-bottom: 3rem;')
          css = css.replace('padding-top: 2.5rem !important; padding-bottom: 5.8rem;', 'padding-top: 2.5rem !important; padding-bottom: 2.5rem;')

          unused_control_rules = (
              '  .hero-carousel__status { min-width: 14rem; }\n',
              '  .hero-carousel__controls { gap: .42rem; padding-inline: .48rem; }\n',
              '  .hero-carousel__status { display: none; }\n',
              '  .hero-carousel__controls { bottom: 1rem; }\n',
              '  .hero-carousel__button { min-width: 2.05rem; min-height: 2.05rem; }\n',
              '  .hero-carousel__toggle { min-width: 4rem; }\n',
              '  .hero-carousel__dots { gap: 0; }\n',
          )
          for rule in unused_control_rules:
              css = css.replace(rule, '')

          css_path.write_text(css, encoding='utf-8')

          script_path = Path('js/hero-carousel.js')
          script_path.write_text("""(() => {
            const carousel = document.getElementById('heroCarousel');
            if (!carousel) return;

            const scenes = [...carousel.querySelectorAll('.hero-carousel__scene')];
            if (scenes.length < 2) return;

            const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            const sceneDuration = 8000;
            let currentScene = 0;
            let timer;

            carousel.style.setProperty('--scene-duration', `${sceneDuration}ms`);

            function scheduleNextScene() {
              window.clearTimeout(timer);
              if (reducedMotion.matches || document.hidden) return;
              timer = window.setTimeout(() => showScene(currentScene + 1), sceneDuration);
            }

            function showScene(index) {
              currentScene = (index + scenes.length) % scenes.length;

              scenes.forEach((scene, sceneIndex) => {
                const active = sceneIndex === currentScene;
                scene.classList.toggle('is-active', active);
                scene.setAttribute('aria-hidden', String(!active));
              });

              scheduleNextScene();
            }

            document.addEventListener('visibilitychange', scheduleNextScene);
            reducedMotion.addEventListener('change', scheduleNextScene);
            showScene(0);
          })();
          """, encoding='utf-8')

          if 'hero-carousel__controls' in index_path.read_text(encoding='utf-8'):
              raise SystemExit('Hero controls remain in index.html')
          if 'hero-carousel__controls' in css_path.read_text(encoding='utf-8'):
              raise SystemExit('Hero control CSS remains in css/site.css')
          PY

      - name: Commit refinements
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html css/site.css js/hero-carousel.js
          if git diff --cached --quiet; then
            echo "No changes were needed."
          else
            git commit -m "Refine index hero banner"
            git push
          fi
