name: Set carousel to 5.5 seconds
on:
  push:
    paths:
      - '.github/workflows/set-carousel-5-5-seconds.yml'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update carousel timing and cache version
        run: |
          python3 - <<'PY'
          from pathlib import Path

          js_path = Path('js/hero-carousel.js')
          js = js_path.read_text()
          js = js.replace('const sceneDuration = 8000;', 'const sceneDuration = 5500;')
          js = js.replace("    if (document.hidden) return;\n", '')
          js = js.replace("\n  document.addEventListener('visibilitychange', scheduleNextScene);", '')
          js_path.write_text(js)

          index_path = Path('index.html')
          html = index_path.read_text()
          html = html.replace('js/hero-carousel.js', 'js/hero-carousel.js?v=20260722-5500-always-on')
          index_path.write_text(html)
          PY
      - name: Commit changes and remove workflow
        run: |
          rm .github/workflows/set-carousel-5-5-seconds.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html js/hero-carousel.js .github/workflows/set-carousel-5-5-seconds.yml
          git commit -m 'Set hero carousel to 5.5 seconds and keep it active'
          git push