name: Fix exact hero LED container
on:
  push:
    paths:
      - '.github/workflows/fix-exact-hero-led-container.yml'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Edit exact container element
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          old = '<div class="container py-4 hero-led-stack">'
          new = '<div class="container py-4 hero-led-stack" style="width:450px;max-width:450px;margin-left:0;margin-right:auto;">'
          if old not in s:
              raise SystemExit('Exact hero LED container not found')
          p.write_text(s.replace(old, new, 1))
          PY
      - name: Commit exact element change and remove workflow
        run: |
          rm .github/workflows/fix-exact-hero-led-container.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/fix-exact-hero-led-container.yml
          git commit -m 'Set exact hero LED container to 450px left aligned'
          git push