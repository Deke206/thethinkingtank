name: Position hero LED stack
on:
  push:
    paths:
      - '.github/workflows/position-hero-led-stack.yml'
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move hero LED stack left and size to 450px
        run: |
          cat >> css/site.css <<'CSS'

/* Left-positioned 450px hero LED stack */
.hero .hero-led-stack {
  width: min(450px, calc(100% - 2rem));
  max-width: 450px;
  margin-left: max(1rem, calc((100vw - 1320px) / 2));
  margin-right: auto;
  justify-self: start;
}
CSS
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text()
          s = s.replace('css/site.css?v=20260722-led-motion', 'css/site.css?v=20260722-led-stack-450-left')
          p.write_text(s)
          PY
      - name: Commit changes and remove workflow
        run: |
          rm .github/workflows/position-hero-led-stack.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add css/site.css index.html .github/workflows/position-hero-led-stack.yml
          git commit -m 'Move hero LED stack left and resize to 450px'
          git push
